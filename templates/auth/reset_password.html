{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5 d-flex align-items-center" style="min-height: 90vh; padding-top: 8rem !important; background: linear-gradient(135deg, rgba(10, 25, 49, 0.95) 0%, rgba(7, 14, 23, 0.98) 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="glass-card p-5 border-color">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-lock-open fa-3x text-gold mb-2"></i>
                        <h2 class="h3 font-serif text-white mb-1">Set New Password</h2>
                        <p class="text-secondary small">Reset password for <strong>{{ reset_user.username }}</strong></p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form action="{% url 'reset_password' reset_user.id %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-secondary small">New Password</label>
                            <input type="password" name="password" class="form-control" placeholder="New Password (min 8 chars)" required style="border-color: var(--border-color);">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm New Password" required style="border-color: var(--border-color);">
                        </div>
                        <button type="submit" class="btn btn-gold w-100 py-3 mb-3 fw-bold"><i class="fas fa-save me-2"></i>Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
