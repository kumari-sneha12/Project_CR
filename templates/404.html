{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5 text-center d-flex align-items-center" style="min-height: 90vh; padding-top: 8rem !important; background: linear-gradient(135deg, rgba(10, 25, 49, 0.95) 0%, rgba(7, 14, 23, 0.98) 100%);">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="glass-card p-5 border-color">
                    <div class="mb-4">
                        <i class="fa-solid fa-triangle-exclamation text-gold fa-5x"></i>
                    </div>
                    <h1 class="display-1 fw-bold font-serif text-white mb-2">404</h1>
                    <h3 class="h4 text-gold mb-3">Page Not Found</h3>
                    <p class="text-secondary mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'home' %}" class="btn btn-gold py-2.5 px-4"><i class="fas fa-home me-2"></i>Go Home</a>
                        <a href="{% url 'car_list' %}" class="btn btn-outline-gold py-2.5 px-4"><i class="fas fa-car-side me-2"></i>View Fleet</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
